name: daily-source-scan
on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily — report ready before the morning
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: source-scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run source scan
        run: python3 scan.py
      - name: Commit snapshots + report
        run: |
          git config user.name "register-scanner"
          git config user.email "actions@github.com"
          # Commit FIRST — converts scan.py's untracked output into a tracked commit,
          # which removes the "untracked file would be overwritten" collision that broke
          # the old pull --rebase --autostash. Then rebase our scan commit onto whatever
          # landed while we ran (a human verification commit touches different files, so
          # the rebase is clean) and push.
          git add snapshots reports scan-report.md data/scan-state.json scan-alert.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "scan: $(date -u +%F) source check"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            git push
          fi
      - name: Surface review items (non-failing — daily email disabled 2026-07-17)
        # Previously exited 1 to trigger GitHub's failed-run email as the alert channel.
        # Disabled: most auto-scan sources are city homepages whose calendars churn daily,
        # producing false high-signal alerts (salzburg/porto/rome...) and a daily email.
        # The scan still runs, commits reports/snapshots, and writes scan-alert.txt for
        # review on demand — it just no longer fails the run. To re-enable email alerts,
        # restore `exit 1` below (and first fix the noisy source URLs / tag them watch:manual).
        run: |
          if [ -f scan-alert.txt ]; then
            echo "::notice::Register review items (see scan-alert.txt / reports/):"
            cat scan-alert.txt
          else
            echo "No action needed."
          fi
