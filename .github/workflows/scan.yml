name: daily-source-scan
on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily — report ready before David's morning
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run source scan
        run: python3 scan.py
      - name: Commit snapshots + report
        run: |
          git config user.name "register-scanner"
          git config user.email "actions@github.com"
          git add snapshots scan-report.md
          git diff --cached --quiet || git commit -m "scan: $(date -u +%F) source check"
          git push
